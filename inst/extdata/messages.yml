# messages.yml — STEP-IN message templates and tips (UTF-8)

templates:
  msg0: |-
    Hola {nombre},

    Ya han pasado las dos primeras semanas del programa STEP-IN.

    📝 Mediante la pulsera Fitbit hemos registrado su número de pasos diarios para conocer su punto de partida.

    Ahora vamos a comenzar con su *primer objetivo personalizado*:
    ➡️ Para las próximas dos semanas, le proponemos caminar *{X} pasos al día* 👣.

    📊 Recuerde: lo importante es la *media semanal*, si algún día camina menos, puede compensarlo en otro momento.

    📱 Le animamos a entrar cada día en la *plataforma HealthyChronos* desde su móvil, donde podrá ver sus pasos diarios y su meta semanal.
    ¡Ánimo en esta primera etapa! 💪

    Estamos a su disposición para cualquier duda.

    Un saludo,

    *Equipo STEP IN*

  pasos1: |-
    Hola {nombre},

    Nos alegra informarle de que *ha alcanzado su objetivo*. ¡Enhorabuena por su esfuerzo y constancia! 🎉

    ➡️ Su nuevo *objetivo* para las próximas dos semanas será caminar *{X} pasos al día* 👣.

    📱 Puede consultar su progreso y estas nuevas metas en la plataforma *HealthyChronos*.

    📊 Recuerde: lo importante es la *media semanal*, si algún día camina menos, puede compensarlo otro día.

    ¡Le animamos a seguir así! 💪

    Estamos a su disposición para cualquier duda.

    Un saludo,

    *Equipo STEP IN*

  pasos2: |-
    Hola {nombre}:

    Hemos revisado sus pasos de las últimas dos semanas y hemos comprobado que *no ha alcanzado su objetivo*. No se preocupe, esto puede ocurrir y forma parte del proceso.

    ➡️ Para las próximas dos semanas, le proponemos mantener el mismo *objetivo*: caminar *{X} pasos al día* 👣.

    {tips_pasos}

    📱 Puede consultar su progreso y estas nuevas metas en la plataforma *HealthyChronos*.

    📊 Recuerde: lo importante es la *media semanal*, si algún día camina menos, puede compensarlo otro día.

    ¡Le animamos a seguir avanzando! 💪

    Estamos a su disposición para cualquier duda.

    Un saludo,

    *Equipo STEP IN*

