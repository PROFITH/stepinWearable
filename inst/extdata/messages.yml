  nodata3: |-
    Hola {nombre},

    Hemos comprobado que, desde hace unos días, en la plataforma HealthyChronos no aparecen registrados sus últimos datos de pasos.
    
    Esto puede deberse a varias razones y queremos asegurarnos de que todo está bien:

    ⌚ *¿Está llevando puesta la pulsera Fitbit?*
    Si no la lleva puesta, ¿puede deberse a algún motivo especial como molestias, olvido u otra circunstancia? Si es así, cuéntenos cómo podemos ayudarle. Usar la pulsera Fitbit es clave para que podamos monitorizar y planificar su progreso durante el estudio.
    
    En caso de que si la lleve puesta:

    📶 *¿Tiene el bluetooth activado en su móvil?*
    Recuerde que el bluetooth debe estar encendido para que la pulsera se sincronice con la aplicación.
    
    🔋 *¿Tiene suficiente batería la pulsera?* Debe cargarse aproximadamente una vez por semana.
    
    📱 *¿Ha abierto recientemente la aplicación Fitbit en su móvil?*
    A veces, es útil abrirla y refrescar la página para que los datos se actualicen correctamente.
    
    Por favor, compruebe estos aspectos y, si necesita ayuda, no dude en escribirnos.

    📞 En caso de que el problema persista, contactaremos con usted por teléfono.
    
    Estamos a su disposición para cualquier duda🤝

    Un saludo,

    *Equipo STEP IN*

tips:
  pasos: |-
    - 🧍‍♀️ Evite estar mucho tiempo seguido sentado/a: levántese cada hora y camine un poco, aunque sea por casa.
    - 🛒 Cuando vaya a hacer recados, estacione un poco más lejos de lo habitual o bájese una parada antes si usa transporte público.
    - 👥 Salir a caminar en compañía puede motivarle más y hacer que el paseo sea más ameno.
    - 📞 Si habla por teléfono, intente hacerlo de pie o caminando por casa.
    - ⏰ Revise su gráfico de pasos antes de la cena: si está por debajo del objetivo, aún está a tiempo de salir a caminar unos minutos.
  intensidad: |-
    - 🕖 Busque el momento del día en el que tenga más energía: caminar más rápido es más fácil cuando uno se siente con fuerzas.
    - ⏱️ Durante sus paseos, alterne 30 segundos a un paso algo más rápido con 30 segundos a su ritmo habitual. Repita esta secuencia varias veces.
    - 🛣️ Elija caminos llanos y rectos, donde sea más fácil mantener el ritmo sin interrupciones.
    - 👫 Si camina con otra persona, proponga aumentar un poco el ritmo entre ambos durante ciertos tramos.
    - 🎶 Escuche música animada con un ritmo constante mientras camina.
    - 🚶‍♂️ Intente empezar su paseo de forma suave y, tras unos minutos de calentamiento, suba ligeramente el ritmo.
  mixto: |-
    - 🕖 Busque el momento del día en el que tenga más energía: caminar más rápido es más fácil cuando uno se siente con fuerzas.
    - 🧍‍♀️ Evite estar mucho tiempo seguido sentado/a: levántese cada hora y camine un poco, aunque sea por casa.
    - 🛒 Cuando vaya a hacer recados, estacione un poco más lejos de lo habitual o bájese una parada antes si usa transporte público.
    - 👥 Salir a caminar en compañía puede motivarle más y hacer que el paseo sea más ameno.
    - 🛣️️ Elija caminos llanos y rectos, donde sea más fácil mantener el ritmo sin interrupciones.
    - 🚶‍♂️ Intente empezar su paseo de forma suave y, tras unos minutos de calentamiento, suba ligeramente el ritmo.
    - ⏱️ Durante sus paseos, alterne 30 segundos a un paso algo más rápido con 30 segundos a su ritmo habitual. Repita esta secuencia varias veces.
    - 🎶 Escuche música animada con un ritmo constante mientras camina (si le resulta cómodo y seguro).
    - ⏰ Revise su gráfico de pasos antes de la cena: si está por debajo del objetivo, aún está a tiempo de salir a caminar unos minutos.


