# messages.yml — STEP-IN message templates and tips (UTF-8)

templates:
  msg0: |-
    Hola {nombre},

    Ya han pasado las dos primeras semanas del programa STEP-IN.

    📝 Mediante la pulsera Fitbit hemos registrado su número de pasos diarios para conocer su punto de partida.

    Ahora vamos a comenzar con su *primer objetivo personalizado*:
    ➡️ Para las próximas dos semanas, le proponemos caminar *{X} pasos al día* 👣.

    📊 Recuerde: lo importante es la *media semanal*, si algún día camina menos, puede compensarlo en otro momento.

    📱 Le animamos a entrar cada día en la *plataforma HealthyChronos* desde su móvil, donde podrá ver sus pasos diarios y su meta semanal.
    
    ¡Ánimo en esta primera etapa! 💪

    Estamos a su disposición para cualquier duda.

    Un saludo,

    *Equipo STEP IN*

