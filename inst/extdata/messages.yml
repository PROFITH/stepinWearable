  nodata3: |-
    Hola {nombre},

    Hemos comprobado que en *HealthyChronos* no aparecen sus últimos datos de pasos. Por favor, revise:

    ⌚ ¿Lleva puesta la pulsera Fitbit?
    📶 ¿Bluetooth activado en el móvil?
    🔋 ¿Batería suficiente en la pulsera?
    📱 ¿Ha abierto recientemente la app Fitbit?

    Si el problema persiste, escríbanos. 📞 Contactaremos con usted si fuera necesario.

    Un saludo,

    *Equipo STEP IN*

tips:
  pasos: |-
    - 🧍‍♀️ Levántese cada hora y camine un poco.
    - 🛒 Aparque un poco más lejos o bájese una parada antes.
    - 👥 Caminar en compañía puede motivarle.
    - 📞 Si habla por teléfono, hágalo de pie o caminando.
    - ⏰ Revise su gráfico antes de la cena y salga unos minutos si va por debajo.
  intensidad: |-
    - 🕖 Elija la hora del día con más energía.
    - ⏱️ Alterne 30 segundos rápido / 30 segundos habitual varias veces.
    - 🛣️ Busque caminos llanos y rectos.
    - 👫 Si camina con alguien, suban un poco el ritmo a ratos.
    - 🎶 Música con ritmo constante (si le resulta cómodo y seguro).
  mixto: |-
    - 🧍‍♀️ Levántese cada hora y camine un poco.
    - 🛒 Aparque un poco más lejos o bájese una parada antes.
    - 👥 Caminar en compañía puede motivarle.
    - 📞 Si habla por teléfono, hágalo de pie o caminando.
    - ⏰ Revise su gráfico antes de la cena y salga unos minutos si va por debajo.
    - 🕖 Elija la hora del día con más energía.
    - ⏱️ Alterne 30 segundos rápido / 30 segundos habitual varias veces.
    - 🛣️ Busque caminos llanos y rectos.
    - 👫 Si camina con alguien, suban un poco el ritmo a ratos.
    - 🎶 Música con ritmo constante (si le resulta cómodo y seguro).

